            - paragraph [ref=e1196]: How do I justify this to my CEO/Board when we just spent millions on our ERP?
            - button [ref=e1197]
          - generic:
            - generic:
              - paragraph: You're not replacing anything—you're fixing one specific problem that's costing you money today. Frame it as a two to four week experiment to stop the bleeding on whatever's killing your metrics. "We're testing a solution for that scheduling chaos that's costing us $50K/month in overtime. If it works, we expand. If not, we've lost nothing." The ERP stays running, no disruption. Once they see the first win, expansion sells itself. You're augmenting, not replacing.
        - generic [ref=e1202] [cursor=pointer]:
          - generic [ref=e1203]:
            - paragraph [ref=e1206]: How do we know which workflow to pick to fix?
            - button [ref=e1207]
          - generic:
            - generic:
              - paragraph: "We help you choose based on three criteria: (1) It's costing you money daily—overtime, rework, delays. (2) You have someone who owns it and wants it fixed. (3) Success is measurable—like \"reduce schedule changes from 4 to 1\" or \"cut quality escapes by half.\" Common winners: scheduling one constraint resource, tracking one quality metric that's killing you, or fixing one inventory black hole. The key: pick something painful enough that fixing it in 2 weeks makes you a hero."
        - generic [ref=e1212] [cursor=pointer]:
          - generic [ref=e1213]:
            - paragraph [ref=e1216]: Do I need to hire IT people or consultants to make this work?
            - button [ref=e1217]
          - generic:
            - generic:
              - paragraph: You decide who leads the build. Use your internal subject matter expert who knows your operation, bring in your trusted consultant, or have IT collaborate with your floor supervisor. Humble provides support throughout—we're not absent vendors who disappear after sale. If you don't have an internal expert available, we can help you find experienced operators who've solved similar problems. When something needs to change later, anyone can describe it in plain English—like explaining it to a new hire. No army of consultants required, but support is there when you need it.
